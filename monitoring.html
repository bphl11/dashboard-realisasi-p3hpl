<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Monitoring Realisasi</title>

    <!-- =====================================================
         BOOTSTRAP CSS
    ====================================================== -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- =====================================================
         BOOTSTRAP ICONS
    ====================================================== -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
        rel="stylesheet"
    >

    <!-- =====================================================
         DATATABLES CSS
    ====================================================== -->
    <link
        href="https://cdn.datatables.net/1.13.8/css/dataTables.bootstrap5.min.css"
        rel="stylesheet"
    >

    <!-- =====================================================
         CSS UTAMA
    ====================================================== -->
    <link
        rel="stylesheet"
        href="assets/css/style.css"
    >

    <style>

        /* =================================================
           TABEL MONITORING
        ================================================= */

        #tblMonitoring {
            width: 100% !important;
            font-size: 12px;
        }

        #tblMonitoring th,
        #tblMonitoring td {
            vertical-align: top;
        }

        #tblMonitoring th {
            white-space: nowrap;
        }


        /* =================================================
           RESPONSIVE TABLE
        ================================================= */

        .table-responsive {
            overflow-x: auto;
        }


        /* =================================================
           BARIS PAGU DIBLOKIR
        ================================================= */

        #tblMonitoring tbody tr.table-danger td,
        #tblMonitoring tbody tr.row-diblokir td {
            background-color: #f8d7da !important;
        }


        /* =================================================
           STATUS DIBLOKIR
        ================================================= */

        .status-diblokir {
            font-weight: bold;
            color: #b02a37;
        }


        /* =================================================
           FILTER
        ================================================= */

        .filter-area select {
            font-size: 13px;
        }


        /* =================================================
           CARD
        ================================================= */

        .monitoring-card {
            border-radius: 12px;
        }

    </style>

</head>


<body>

<div class="wrapper">


    <!-- =====================================================
         SIDEBAR
    ====================================================== -->

    <aside class="sidebar">

        <div class="logo">

            <h4>
                🌲 BPHL XI
            </h4>

            <small>
                Dashboard Realisasi
            </small>

        </div>


        <ul>

            <!-- DASHBOARD -->

            <li>

                <a href="index.html">

                    <i class="bi bi-house"></i>

                    Dashboard

                </a>

            </li>


            <!-- MONITORING -->

            <li class="active">

                <a href="monitoring.html">

                    <i class="bi bi-table"></i>

                    Monitoring

                </a>

            </li>


            <!-- GRAFIK -->

            <li>

                <a href="grafik.html">

                    <i class="bi bi-bar-chart"></i>

                    Grafik

                </a>

            </li>


            <!-- LAPORAN -->

            <li>

                <a href="laporan.html">

                    <i class="bi bi-file-earmark-text"></i>

                    Laporan

                </a>

            </li>

        </ul>

    </aside>



    <!-- =====================================================
         CONTENT
    ====================================================== -->

    <main class="content">


        <!-- =================================================
             HEADER
        ================================================== -->

        <header class="mb-3">

            <h2>
                Monitoring Realisasi
            </h2>

            <p class="text-muted mb-0">
                BPHL XI Banjarbaru
            </p>

        </header>



        <!-- =================================================
             CARD MONITORING
        ================================================== -->

        <div class="card p-3 monitoring-card">


            <!-- =============================================
                 FILTER
            ============================================== -->

            <div class="row g-3 mb-3 filter-area">


                <!-- FILTER KOMPONEN -->

                <div class="col-md-4">

                    <label
                        for="filterKomponen"
                        class="form-label"
                    >
                        Komponen
                    </label>

                    <select
                        id="filterKomponen"
                        class="form-select"
                    >

                        <option value="">
                            Semua Komponen
                        </option>

                    </select>

                </div>



                <!-- FILTER SUB KOMPONEN -->

                <div class="col-md-4">

                    <label
                        for="filterSubKomponen"
                        class="form-label"
                    >
                        Sub Komponen
                    </label>

                    <select
                        id="filterSubKomponen"
                        class="form-select"
                    >

                        <option value="">
                            Semua Sub Komponen
                        </option>

                    </select>

                </div>



                <!-- FILTER AKUN -->

                <div class="col-md-4">

                    <label
                        for="filterAkun"
                        class="form-label"
                    >
                        Akun Belanja
                    </label>

                    <select
                        id="filterAkun"
                        class="form-select"
                    >

                        <option value="">
                            Semua Akun Belanja
                        </option>

                    </select>

                </div>

            </div>



            <!-- =============================================
                 TABEL MONITORING
            ============================================== -->

            <div class="table-responsive">

                <table
                    id="tblMonitoring"
                    class="table table-striped table-bordered table-hover"
                >

                    <thead>

                        <tr>

                            <th>
                                Kode
                            </th>

                            <th>
                                Kegiatan
                            </th>

                            <th>
                                Komponen
                            </th>

                            <th>
                                Output
                            </th>

                            <th>
                                Sub Komponen
                            </th>

                            <th>
                                Akun Belanja
                            </th>

                            <th>
                                Item Akun
                            </th>

                            <th>
                                Rincian Item
                            </th>

                            <th>
                                Status Pagu
                            </th>

                            <th>
                                Pagu
                            </th>

                            <th>
                                Realisasi
                            </th>

                            <th>
                                Sisa
                            </th>

                            <th>
                                %
                            </th>

                        </tr>

                    </thead>


                    <tbody>

                        <!--
                            Data akan dibuat otomatis
                            oleh monitoring.js
                        -->

                    </tbody>

                </table>

            </div>


        </div>


    </main>


</div>

========================================================== -->

</script>



<!-- =========================================================

========================================================== -->

<script
    src="assets/js/config.js">
</script>



<!-- =========================================================

========================================================== -->

<script
    src="assets/js/api.js">
</script>

     PARSER
     WAJIB berada sebelum monitoring.js

     Bertugas membaca:
     - Kegiatan
     - Output
     - Komponen
     - Sub Komponen
     - Akun
     - Item
     - Rincian
     - Pagu
     - Realisasi
     - Sisa
========================================================== -->

    src="assets/js/parser.js">
</script>

     MONITORING
     Mengatur:
     - Filter Komponen
     - Filter Sub Komponen
     - Filter Akun
     - Tabel

    src="assets/js/monitoring.js">
</script>


</body>

</html>
